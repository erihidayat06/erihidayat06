<!-- Website situga-->
<div class="col">
  <div class="card">
    <img
      class="object-fit-cover border rounded"
      src="img/situga.png"
      alt=""
      height="150px" />
    <div class="p-2">
      <h6 class="fw-bold text-truncate">Website situga</h6>
    </div>
    <div class="card-body">
      <a
        href=""
        class="f-main"
        data-bs-toggle="modal"
        data-bs-target="#situgaModal"
        >Selengkapnya</a
      >
    </div>
  </div>

  <!-- Modal -->
  <div
    class="modal fade"
    id="situgaModal"
    tabindex="-1"
    aria-labelledby="situgaModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="situgaModalLabel">Website SITUGA</h2>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <img src="img/situga.png" width="100%" alt="" />
        </div>
        <div class="container mb-5">
          <p class="fw-bold">Deskripsi</p>
          <p>
            Website situga merupakan website laporan harga barang yang ada di
            pasar tradisonal kabupaten brebes.
          </p>
          <!-- Baha Pemprograman -->
          <p class="fw-bold">Bahasa Pemprograman</p>
          <div class="justify-contain-start mb-3">
            <img
              src="img/html.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />
            <img
              src="img/css.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />

            <img
              src="img/js.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />

            <img
              src="img/php.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />
          </div>
          <!-- End Bahasa Pemprograman -->

          <!-- Framework -->
          <p class="fw-bold">Framework</p>
          <div class="justify-contain-start">
            <img
              src="img/laravel.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />
            <img
              src="img/bootstrap.png"
              width="30px"
              height="30px"
              class="object-fit-scale rounded"
              alt="" />
          </div>
          <!-- End Bahasa Framework -->
        </div>
        <div class="modal-footer">
          <a
            href="https://github.com/erihidayat06/harga-pasar"
            type="button"
            class="btn btn-primary">
            Lihat Project
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- End Webiste situga -->
